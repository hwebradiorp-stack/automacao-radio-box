name: Automacao Radio MediaFire

on:
  schedule:
    # 08:00 UTC = 05:00 da manhã em Ribeirão Preto
    - cron: '0 8 * * *'
  workflow_dispatch: # Botão para rodar manualmente

jobs:
  upload_mediafire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install mediafire requests  # Aqui mudamos para mediafire

      - name: Executar Script MediaFire
        env:
          # Lembre-se de criar esses nomes exatos nos Secrets do GitHub
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
        run: python main.py
