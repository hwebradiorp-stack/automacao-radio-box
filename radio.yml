name: Download e Envio Radio

on:
  schedule:
    # 08:00 UTC é 05:00 em Ribeirão Preto
    - cron: '0 8 * * *'
  workflow_dispatch: # Botão para rodar manualmente

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        # ESTA PARTE RESOLVE O ERRO DE MODULE NOT FOUND
        run: |
          python -m pip install --upgrade pip
          pip install boxsdk[jwt] requests

      - name: Executar Automacao
        env:
          # Puxa os segredos que voce salvou no GitHub
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          BOX_TOKEN: ${{ secrets.BOX_DEVELOPER_TOKEN }}
        run: python main.py
