name: Automacao Radio pCloud

on:
  schedule:
    - cron: '0 8 * * *' # Roda todo dia às 05:00 (Brasília)
  workflow_dispatch: 

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Script
        env:
          PCLOUD_EMAIL: ${{ secrets.PCLOUD_EMAIL }}
          PCLOUD_PASS: ${{ secrets.PCLOUD_PASS }}
        run: python main.py
