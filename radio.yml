name: Automacao Radio MediaFire

on:
  schedule:
    - cron: '0 8 * * *' # Roda às 05:00 de Ribeirão Preto
  workflow_dispatch: 

jobs:
  upload_mediafire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Bibliotecas Base
        run: |
          python -m pip install --upgrade pip
          pip install requests mediafire

      - name: Executar Script Principal
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
        run: python main.py
