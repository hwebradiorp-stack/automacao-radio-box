name: Automacao Radio Dropbox

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  upload_dropbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalar Bibliotecas
        run: pip install dropbox requests
      - name: Executar Automacao
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
        run: python main.py
