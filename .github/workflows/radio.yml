name: Automacao Radio Mega.nz

on:
  schedule:
    # 08:00 UTC = 05:00 da manhã em Ribeirão Preto
    - cron: '0 8 * * *'
  workflow_dispatch: # Botão para rodar manualmente

jobs:
  upload_mega:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Bibliotecas
        # ESTA LINHA ABAIXO É A QUE RESOLVE O SEU ERRO
        run: |
          python -m pip install --upgrade pip
          pip install mega.py requests

      - name: Executar Script Mega
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: python main.py
