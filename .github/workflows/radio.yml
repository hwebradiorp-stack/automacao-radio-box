name: Automacao Radio Sem Senha

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Script
        run: python main.py
